<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>BikeNav &mdash; Phone &rarr; ESP32</title>
<style>
  :root { color-scheme: dark; }
  body { margin: 0; font-family: system-ui, sans-serif; background: #0b0f14; color: #e6edf3;
         display: flex; flex-direction: column; align-items: center; gap: 14px; padding: 24px 16px 80px; }
  h1 { font-size: 19px; margin: 4px 0 0; }
  button { font-size: 16px; padding: 12px 18px; border: 0; border-radius: 10px;
           background: #2f81f7; color: #fff; font-weight: 600; cursor: pointer; }
  button:disabled { background: #30363d; color: #8b949e; cursor: not-allowed; }
  #stop, #clear-route { background: #b62324; }
  input { font-size: 16px; padding: 12px 14px; border: 1px solid #30363d; background: #161b22;
          color: #e6edf3; border-radius: 10px; width: 260px; max-width: 70vw; }
  .row { display: flex; gap: 10px; flex-wrap: wrap; justify-content: center; }
  .grid { width: 100%; max-width: 420px; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .card { background: #161b22; border: 1px solid #30363d; border-radius: 12px; padding: 12px 14px; }
  .card .k { font-size: 12px; color: #8b949e; text-transform: uppercase; letter-spacing: .04em; }
  .card .v { font-size: 22px; font-variant-numeric: tabular-nums; margin-top: 4px; }
  #route-card { width: 100%; max-width: 420px; background: #0f2f1c; border: 1px solid #2ea043;
                border-radius: 12px; padding: 14px; }
  #route-card .label { font-size: 12px; color: #8b949e; text-transform: uppercase; }
  #route-card .big { font-size: 22px; font-weight: 700; margin-top: 4px; }
  #route-card .row2 { display: flex; gap: 16px; margin-top: 6px; color: #aeb6c0; font-variant-numeric: tabular-nums; }
  #suggestions { width: 260px; max-width: 70vw; background: #161b22; border: 1px solid #30363d; border-radius: 10px; padding: 4px; }
  .sug { padding: 9px 10px; border-radius: 6px; cursor: pointer; }
  .sug:active, .sug.active { background: #22272e; }
  .sug .name { font-size: 14px; color: #e6edf3; }
  .sug .meta { font-size: 11px; color: #8b949e; margin-top: 2px; }
  .sug .src  { font-size: 10px; color: #6e7681; float: right; margin-left: 8px; }
  #status { font-size: 14px; color: #8b949e; min-height: 20px; text-align: center; max-width: 100%; }
  .dot { display: inline-block; width: 9px; height: 9px; border-radius: 50%; margin-right: 6px; vertical-align: middle; background: #b62324; }
  .dot.on { background: #2ea043; }
  .muted { color: #8b949e; font-size: 12px; }
</style>
</head>
<body>
  <h1>BikeNav</h1>

  <div class="row">
    <button id="connect">Connect to ESP32-GPS</button>
    <button id="stop" hidden>Disconnect</button>
  </div>
  <div id="status"><span class="dot" id="dot"></span><span id="statusText">Not connected. Tap Connect (Android Chrome).</span></div>

  <div class="row" id="dest-row">
    <input id="dest" placeholder="Where to? (e.g. Connaught Place, Delhi)" autocapitalize="words" autocomplete="off">
    <button id="go">Go</button>
    <button id="clear-route" hidden>Clear</button>
  </div>
  <div id="suggestions" hidden></div>

  <div id="route-card" hidden>
    <div class="label">To</div>
    <div class="big" id="route-dest">&mdash;</div>
    <div class="row2">
      <div><span class="label">Distance</span> <div id="route-dist">&mdash;</div></div>
      <div><span class="label">ETA</span> <div id="route-eta">&mdash;</div></div>
    </div>
    <div class="label" style="margin-top:10px">Next step</div>
    <div id="route-next" style="margin-top:4px">&mdash;</div>
  </div>

  <div class="grid">
    <div class="card"><div class="k">Speed</div><div class="v"><span id="speed">--</span> km/h</div></div>
    <div class="card"><div class="k">Heading</div><div class="v"><span id="heading">--</span>&deg;</div></div>
    <div class="card"><div class="k">Latitude</div><div class="v" id="lat">--</div></div>
    <div class="card"><div class="k">Longitude</div><div class="v" id="lon">--</div></div>
    <div class="card"><div class="k">Accuracy</div><div class="v">&plusmn;<span id="acc">--</span> m</div></div>
    <div class="card"><div class="k">Sent</div><div class="v" id="sent">0</div></div>
  </div>

  <div class="muted">Routing: OSRM (open-source) &nbsp;&middot;&nbsp; Geocoding: Nominatim (OSM)</div>

<script>
// ---------- BLE constants (match GpsDisplay firmware) ----------
const SERVICE_UUID  = 0xffe0;
const CHAR_GPS_UUID = 0xffe1;   // CSV "lat,lon,speed,heading,acc"
const CHAR_NAV_UUID = 0xffe2;   // binary nav packet (new in firmware v2)

// ---------- maneuver enum (must match firmware) ----------
const MAN = { CONTINUE:0, SLIGHT_L:1, LEFT:2, SHARP_L:3, SLIGHT_R:4, RIGHT:5, SHARP_R:6, UTURN:7, ARRIVE:8, ROUNDABOUT:9, DEPART:10 };

// ---------- state ----------
let gpsChar = null, navChar = null;
let device = null;
let watchId = null;
let sentCount = 0;
let route = null;        // { steps:[], distance, duration, destName }
let stepIdx = 0;

const $ = id => document.getElementById(id);
const setStatus = (t, ok=false) => { $('statusText').textContent = t; $('dot').classList.toggle('on', ok); };

// ---------- BLE connect ----------
async function connect() {
  if (!navigator.bluetooth)   { setStatus('Web Bluetooth unavailable. Use Android Chrome over HTTPS.'); return; }
  if (!navigator.geolocation) { setStatus('Geolocation unavailable on this browser.'); return; }
  try {
    setStatus('Choosing device...');
    device = await navigator.bluetooth.requestDevice({
      filters: [{ services: [SERVICE_UUID] }],
      optionalServices: [SERVICE_UUID],
    });
    device.addEventListener('gattserverdisconnected', onDisconnected);

    setStatus('Connecting...');
    const server  = await device.gatt.connect();
    const service = await server.getPrimaryService(SERVICE_UUID);
    gpsChar = await service.getCharacteristic(CHAR_GPS_UUID);
    try { navChar = await service.getCharacteristic(CHAR_NAV_UUID); }
    catch { navChar = null; }                       // older firmware (no nav yet) is fine

    $('connect').hidden = true;
    $('stop').hidden    = false;
    setStatus(navChar ? 'Connected. Ready to navigate.' : 'Connected (firmware lacks nav char - GPS only).', true);

    ensureWatching();
  } catch (e) {
    setStatus('Connect failed: ' + e.message);
  }
}

function onDisconnected() {
  gpsChar = navChar = null;
  if (watchId != null) { navigator.geolocation.clearWatch(watchId); watchId = null; }
  $('connect').hidden = false; $('stop').hidden = true;
  setStatus('Disconnected.');
}

// ---------- destination + autocomplete ----------
// Photon (komoot) is built on OSM but optimised for autocomplete - much better
// at partial / fuzzy matches than Nominatim. We bias by the user's last known
// position so "Main St" prefers the nearby one. Nominatim is used as a fallback
// when Photon returns nothing for a query.

let lastKnownPos = null;       // [lat, lon] for biasing suggestions
let selectedDest = null;       // user's chosen suggestion ({lat, lon, name, meta})
let suggestTimer = null;
let activeSuggestion = -1;

function escapeHtml(s) {
  return (s + '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));
}

// Try to grab a position (one-shot) so we can bias suggestions. Cheap, low accuracy is fine.
function primeLastKnownPos() {
  if (!navigator.geolocation || lastKnownPos) return;
  navigator.geolocation.getCurrentPosition(
    p => { lastKnownPos = [p.coords.latitude, p.coords.longitude]; },
    () => {}, { enableHighAccuracy: false, timeout: 6000, maximumAge: 300000 }
  );
}

async function fetchPhotonSuggestions(q) {
  const u = new URL('https://photon.komoot.io/api/');
  u.searchParams.set('q', q);
  u.searchParams.set('limit', '6');
  if (lastKnownPos) {
    u.searchParams.set('lat', lastKnownPos[0]);
    u.searchParams.set('lon', lastKnownPos[1]);
  }
  u.searchParams.set('lang', 'en');
  const r = await fetch(u);
  if (!r.ok) throw new Error('photon ' + r.status);
  const data = await r.json();
  return (data.features || []).map(f => {
    const p = f.properties || {};
    const [lon, lat] = f.geometry.coordinates;
    const metaParts = [p.street, p.city || p.county || p.locality, p.state, p.country].filter(Boolean);
    return {
      lat, lon,
      name: p.name || metaParts[0] || 'Place',
      meta: [...new Set(metaParts.filter(x => x !== p.name))].join(', '),
      src: 'photon',
    };
  });
}

async function fetchNominatimSuggestions(q) {
  const u = new URL('https://nominatim.openstreetmap.org/search');
  u.searchParams.set('format', 'json');
  u.searchParams.set('q', q);
  u.searchParams.set('limit', '6');
  u.searchParams.set('addressdetails', '1');
  if (lastKnownPos) {
    const [la, lo] = lastKnownPos;
    u.searchParams.set('viewbox', `${lo-0.5},${la-0.5},${lo+0.5},${la+0.5}`);
    u.searchParams.set('bounded', '0');           // prefer, don't restrict
  }
  const r = await fetch(u, { headers: { 'Accept': 'application/json' } });
  if (!r.ok) throw new Error('nominatim ' + r.status);
  const data = await r.json();
  return data.map(d => {
    const a = d.address || {};
    const headline = a.amenity || a.tourism || a.shop || a.name || d.namedetails?.name || d.display_name.split(',')[0];
    const meta = [a.city || a.town || a.village || a.county, a.state, a.country].filter(Boolean).join(', ');
    return { lat: +d.lat, lon: +d.lon, name: headline, meta, src: 'osm' };
  });
}

async function fetchSuggestions(q) {
  // Photon first; if empty, fall through to Nominatim.
  try {
    const photon = await fetchPhotonSuggestions(q);
    if (photon.length) return photon;
  } catch {}
  try {
    return await fetchNominatimSuggestions(q);
  } catch {
    return [];
  }
}

function renderSuggestions(items) {
  const el = $('suggestions');
  el.innerHTML = '';
  activeSuggestion = -1;
  if (!items.length) { el.hidden = true; return; }
  el.hidden = false;
  items.forEach((it, idx) => {
    const div = document.createElement('div');
    div.className = 'sug';
    div.dataset.idx = idx;
    div.innerHTML = `<span class="src">${escapeHtml(it.src)}</span>
                     <div class="name">${escapeHtml(it.name)}</div>
                     <div class="meta">${escapeHtml(it.meta)}</div>`;
    div.addEventListener('click', () => selectSuggestion(it));
    el.appendChild(div);
  });
  el._items = items;
}

function selectSuggestion(it) {
  selectedDest = it;
  $('dest').value = it.name + (it.meta ? `  (${it.meta})` : '');
  renderSuggestions([]);
}

function onDestInput(e) {
  const q = e.target.value.trim();
  selectedDest = null;                    // typing invalidates any prior pick
  if (suggestTimer) clearTimeout(suggestTimer);
  if (q.length < 2) { renderSuggestions([]); return; }
  suggestTimer = setTimeout(async () => {
    primeLastKnownPos();
    const items = await fetchSuggestions(q);
    // If the user kept typing in the meantime, drop stale results.
    if ($('dest').value.trim() !== q) return;
    renderSuggestions(items);
  }, 250);
}

// Dismiss suggestions on clicks outside the input/list.
document.addEventListener('click', e => {
  if (e.target.closest('#suggestions') || e.target.id === 'dest') return;
  renderSuggestions([]);
});

// Resolve a typed query without an explicit pick. Returns same shape as a suggestion.
async function resolveTyped(query) {
  const items = await fetchSuggestions(query);
  if (!items.length) throw new Error('Address not found');
  return items[0];
}

async function fetchRoute(from, to) {
  // Public OSRM demo is most reliable on the 'driving' profile; usable for biking too.
  const url = `https://router.project-osrm.org/route/v1/driving/${from.lon},${from.lat};${to.lon},${to.lat}`
            + `?steps=true&overview=full&geometries=polyline&annotations=false`;
  const r = await fetch(url);
  if (!r.ok) throw new Error('routing ' + r.status);
  const data = await r.json();
  if (data.code !== 'Ok' || !data.routes?.length) throw new Error('No route found');
  return data.routes[0];
}

function getOneTimePosition() {
  return new Promise((res, rej) =>
    navigator.geolocation.getCurrentPosition(res, rej, { enableHighAccuracy: true, timeout: 15000, maximumAge: 0 }));
}

async function go() {
  // Prefer an explicit pick from the suggestion list; fall back to resolving
  // whatever text is in the box (Photon -> Nominatim chain).
  let dest = selectedDest;
  if (!dest) {
    const q = $('dest').value.trim();
    if (!q) return;
    setStatus('Looking up address...', true);
    try { dest = await resolveTyped(q); } catch (e) { setStatus('Address not found: ' + e.message); return; }
  }
  renderSuggestions([]);                  // close the dropdown if open

  let here;
  setStatus('Getting current position...', true);
  try { here = await getOneTimePosition(); }  catch (e) { setStatus('GPS: ' + e.message); return; }
  lastKnownPos = [here.coords.latitude, here.coords.longitude];
  setStatus('Fetching route...', true);
  let r;
  try { r = await fetchRoute({lat: here.coords.latitude, lon: here.coords.longitude}, dest); }
  catch (e) { setStatus('Routing: ' + e.message); return; }

  const steps = [];
  for (const leg of r.legs) for (const s of leg.steps) steps.push(s);
  route = { steps, distance: r.distance, duration: r.duration, destName: dest.name };
  stepIdx = 0;

  $('route-card').hidden  = false;
  $('clear-route').hidden = false;
  $('route-dest').textContent = dest.name + (dest.meta ? '  ·  ' + dest.meta.split(',')[0] : '');
  $('route-dist').textContent = (r.distance / 1000).toFixed(1) + ' km';
  $('route-eta').textContent  = Math.round(r.duration / 60) + ' min';
  setStatus(navChar ? 'Route loaded. Uploading polyline...' : 'Route loaded (no nav char on board - flash firmware v2).', true);

  // Reset local-polyline pacing for the new route.
  lastLocalSendMs = 0;
  lastLocalCentre = null;

  // Upload the route overview to firmware (for the MAP view); the high-res
  // local slice is then refreshed automatically as the rider moves.
  if (navChar && r.geometry) sendOverview(r.geometry).catch(()=>{});

  ensureWatching();
}

function clearRoute() {
  route = null; stepIdx = 0;
  $('route-card').hidden  = true;
  $('clear-route').hidden = true;
  $('route-next').textContent = '—';
}

// ---------- polyline upload (route shape -> ESP32 map view) ----------
// Decode Google encoded polyline (precision 1e5) -> array of [lat, lon].
function decodePolyline(str) {
  let index = 0, lat = 0, lng = 0;
  const out = [];
  while (index < str.length) {
    let b, shift = 0, result = 0;
    do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lat += (result & 1) ? ~(result >> 1) : (result >> 1);
    shift = 0; result = 0;
    do { b = str.charCodeAt(index++) - 63; result |= (b & 0x1f) << shift; shift += 5; } while (b >= 0x20);
    lng += (result & 1) ? ~(result >> 1) : (result >> 1);
    out.push([lat / 1e5, lng / 1e5]);
  }
  return out;
}

// Perpendicular distance treating lat/lon as planar (good enough at city scales).
function perpDist(p, a, b) {
  const y = p[0], x = p[1];
  const y1 = a[0], x1 = a[1];
  const y2 = b[0], x2 = b[1];
  const dx = x2 - x1, dy = y2 - y1;
  if (dx === 0 && dy === 0) return Math.hypot(x - x1, y - y1);
  const t = ((x - x1) * dx + (y - y1) * dy) / (dx*dx + dy*dy);
  return Math.hypot(x - (x1 + t * dx), y - (y1 + t * dy));
}

// Iterative Douglas-Peucker (stack-based; avoids recursion blow-up on long
// routes). Drops points whose perpendicular distance from the segment between
// their kept neighbours is less than `eps` (in degrees).
function rdpSimplify(pts, eps) {
  if (pts.length < 3) return pts.slice();
  const keep = new Array(pts.length).fill(false);
  keep[0] = keep[pts.length - 1] = true;
  const stack = [[0, pts.length - 1]];
  while (stack.length) {
    const [s, e] = stack.pop();
    let maxd = 0, idx = -1;
    for (let i = s + 1; i < e; i++) {
      const d = perpDist(pts[i], pts[s], pts[e]);
      if (d > maxd) { maxd = d; idx = i; }
    }
    if (maxd > eps && idx > 0) {
      keep[idx] = true;
      stack.push([s, idx], [idx, e]);
    }
  }
  return pts.filter((_, i) => keep[i]);
}

// Find the smallest tolerance that yields <= target points (binary-search).
// Preserves shape much better than uniform every-Nth downsampling: corners stay,
// straight runs collapse.
function downsampleDP(pts, target) {
  if (pts.length <= target) return pts;
  let lo = 1e-9, hi = 1.0;
  while (rdpSimplify(pts, hi).length > target) hi *= 2;
  let best = rdpSimplify(pts, hi);
  for (let it = 0; it < 24; it++) {
    const mid = (lo + hi) / 2;
    const s = rdpSimplify(pts, mid);
    if (s.length > target) lo = mid;
    else { hi = mid; best = s; }
  }
  return best;
}

// Walk along the polyline in both directions from the nearest index until we've
// accumulated ~radiusM of arc length on each side. Returns that contiguous slice.
function sliceAroundPosition(pts, lat, lon, radiusM) {
  if (!pts.length) return [];
  let nearest = 0, nd = Infinity;
  for (let i = 0; i < pts.length; i++) {
    const d = haversine({lat, lon}, {lat: pts[i][0], lon: pts[i][1]});
    if (d < nd) { nd = d; nearest = i; }
  }
  let start = nearest, accB = 0;
  for (let i = nearest - 1; i >= 0 && accB < radiusM; i--) {
    accB += haversine({lat: pts[i][0], lon: pts[i][1]}, {lat: pts[i+1][0], lon: pts[i+1][1]});
    start = i;
  }
  let end = nearest, accF = 0;
  for (let i = nearest + 1; i < pts.length && accF < radiusM; i++) {
    accF += haversine({lat: pts[i-1][0], lon: pts[i-1][1]}, {lat: pts[i][0], lon: pts[i][1]});
    end = i;
  }
  return pts.slice(start, end + 1);
}

// Stream a polyline to firmware via 0xFFE2 meta frames. Subtype triplet picks
// the destination buffer: (0x00, 0x01, 0x02) = OVERVIEW, (0x10, 0x11, 0x12) = LOCAL.
async function sendPolylineFrames(pts, beginByte, pointsByte, endByte) {
  if (!navChar || pts.length < 2) return;

  let laMin = pts[0][0], laMax = pts[0][0], loMin = pts[0][1], loMax = pts[0][1];
  for (const [la, lo] of pts) {
    if (la < laMin) laMin = la; if (la > laMax) laMax = la;
    if (lo < loMin) loMin = lo; if (lo > loMax) loMax = lo;
  }

  // Serialise through the same write queue as GPS/nav.
  while (writeBusy) await new Promise(r => setTimeout(r, 30));
  writeBusy = true;
  try {
    const begin = new ArrayBuffer(22);
    const bd = new DataView(begin);
    bd.setUint8(0, 0xFF); bd.setUint8(1, beginByte);
    bd.setUint16(2, pts.length, true);
    bd.setUint16(4, 0, true);
    bd.setInt32(6,  Math.round(laMin * 1e6), true);
    bd.setInt32(10, Math.round(laMax * 1e6), true);
    bd.setInt32(14, Math.round(loMin * 1e6), true);
    bd.setInt32(18, Math.round(loMax * 1e6), true);
    await navChar.writeValueWithoutResponse(new Uint8Array(begin));
    await new Promise(r => setTimeout(r, 70));

    // Bigger batch + longer gap = fewer total writes and more time between
    // them, so Bluedroid's BTC_TASK on the ESP doesn't get backed up.
    const BATCH = 16;                       // 16 * 8 + 3 = 131 bytes (still <= MTU)
    for (let i = 0; i < pts.length; i += BATCH) {
      const count = Math.min(BATCH, pts.length - i);
      const buf = new ArrayBuffer(3 + count * 8);
      const dv  = new DataView(buf);
      dv.setUint8(0, 0xFF); dv.setUint8(1, pointsByte); dv.setUint8(2, count);
      for (let j = 0; j < count; j++) {
        const [la, lo] = pts[i + j];
        dv.setInt32(3 + j * 8,     Math.round(la * 1e6), true);
        dv.setInt32(3 + j * 8 + 4, Math.round(lo * 1e6), true);
      }
      await navChar.writeValueWithoutResponse(new Uint8Array(buf));
      await new Promise(r => setTimeout(r, 60));
    }

    await navChar.writeValueWithoutResponse(new Uint8Array([0xFF, endByte]));
  } finally {
    writeBusy = false;
  }
}

let routeRawPoints   = null;       // full decoded polyline of the current route
let lastLocalSendMs  = 0;
let lastLocalCentre  = null;       // [lat, lon] last point we sent a local around

async function sendOverview(polylineStr) {
  try {
    routeRawPoints = decodePolyline(polylineStr);
    const overview = downsampleDP(routeRawPoints, 128);   // firmware MAX_POLY_POINTS
    await sendPolylineFrames(overview, 0x00, 0x01, 0x02);
    setStatus(`Map sent (${overview.length} pts, more detail as you move).`, true);
  } catch (e) {
    setStatus('Polyline upload failed: ' + e.message);
  }
}

const LOCAL_INTERVAL_MS = 3000;
const LOCAL_MOVE_M      = 100;     // only resend if rider moved this much
const LOCAL_RADIUS_M    = 1500;
const LOCAL_TARGET_PTS  = 64;

async function maybeSendLocal(lat, lon) {
  if (!navChar || !routeRawPoints) return;
  const now = Date.now();
  if (now - lastLocalSendMs < LOCAL_INTERVAL_MS) return;
  if (lastLocalCentre &&
      haversine({lat, lon}, {lat: lastLocalCentre[0], lon: lastLocalCentre[1]}) < LOCAL_MOVE_M) return;

  const slice = sliceAroundPosition(routeRawPoints, lat, lon, LOCAL_RADIUS_M);
  if (slice.length < 2) return;
  const simp  = downsampleDP(slice, LOCAL_TARGET_PTS);
  lastLocalSendMs = now;
  lastLocalCentre = [lat, lon];
  try { await sendPolylineFrames(simp, 0x10, 0x11, 0x12); } catch {}
}

// ---------- helpers ----------
function haversine(a, b) {                       // meters between two {lat,lon}
  const R = 6371000;
  const φ1 = a.lat*Math.PI/180, φ2 = b.lat*Math.PI/180;
  const dφ = (b.lat - a.lat)*Math.PI/180;
  const dλ = (b.lon - a.lon)*Math.PI/180;
  const x  = Math.sin(dφ/2)**2 + Math.cos(φ1)*Math.cos(φ2)*Math.sin(dλ/2)**2;
  return 2 * R * Math.asin(Math.sqrt(x));
}

function osrmToManeuver(type, modifier) {        // OSRM step -> {m, angle}
  if (type === 'arrive')                                                   return { m: MAN.ARRIVE,    angle: 0 };
  if (type === 'depart')                                                   return { m: MAN.DEPART,    angle: 0 };
  if (type === 'roundabout' || type === 'rotary' || type === 'exit roundabout') return { m: MAN.ROUNDABOUT, angle: 0 };
  switch (modifier) {
    case 'sharp left':   return { m: MAN.SHARP_L,  angle: -135 };
    case 'left':         return { m: MAN.LEFT,     angle:  -90 };
    case 'slight left':  return { m: MAN.SLIGHT_L, angle:  -30 };
    case 'straight':     return { m: MAN.CONTINUE, angle:    0 };
    case 'slight right': return { m: MAN.SLIGHT_R, angle:   30 };
    case 'right':        return { m: MAN.RIGHT,    angle:   90 };
    case 'sharp right':  return { m: MAN.SHARP_R,  angle:  135 };
    case 'uturn':        return { m: MAN.UTURN,    angle:  180 };
  }
  return { m: MAN.CONTINUE, angle: 0 };
}

function packNav(m, angle, dist_m, eta_min, remaining_m, street, manLat, manLon) {
  const sBytes = new TextEncoder().encode((street || '').slice(0, 36));
  const hasLoc = (manLat != null && manLon != null && !isNaN(manLat) && !isNaN(manLon));
  const headerLen = hasLoc ? 18 : 10;                                         // firmware accepts both
  const buf = new ArrayBuffer(headerLen + sBytes.length);
  const dv  = new DataView(buf);
  dv.setUint8 (0, m & 0xff);
  dv.setUint8 (1, 0);                                                         // units: 0 = metric
  dv.setInt16 (2, Math.max(-32768, Math.min(32767, Math.round(angle))), true);
  dv.setUint16(4, Math.min(65535, Math.max(0, Math.round(dist_m))),       true);
  dv.setUint16(6, Math.min(65535, Math.max(0, Math.round(eta_min))),      true);
  dv.setUint16(8, Math.min(65535, Math.max(0, Math.round(remaining_m))),  true);
  if (hasLoc) {
    dv.setInt32(10, Math.round(manLat * 1e6), true);                          // maneuver lat
    dv.setInt32(14, Math.round(manLon * 1e6), true);                          // maneuver lon
  }
  new Uint8Array(buf, headerLen).set(sBytes);
  return buf;
}

// ---------- live GPS + nav streaming ----------
function ensureWatching() {
  if (watchId != null) return;
  watchId = navigator.geolocation.watchPosition(onPosition, onGeoError,
    { enableHighAccuracy: true, maximumAge: 0, timeout: 15000 });
}

// Throttle: don't pile up writes on the BLE stack. Android Web Bluetooth
// can return "GATT operation failed" when two writes are kicked off in the
// same tick (one per characteristic) without awaiting. We serialize with
// await and rate-limit the nav write.
const NAV_MIN_INTERVAL_MS = 800;
let lastNavWrite = 0;
let writeBusy = false;

async function onPosition(pos) {
  const c       = pos.coords;
  const speed   = (c.speed   == null || isNaN(c.speed))   ? 0  : c.speed;
  const heading = (c.heading == null || isNaN(c.heading)) ? -1 : c.heading;
  const acc     = c.accuracy || 0;

  $('lat').textContent     = c.latitude.toFixed(5);
  $('lon').textContent     = c.longitude.toFixed(5);
  $('speed').textContent   = (speed * 3.6).toFixed(0);
  $('heading').textContent = heading < 0 ? '--' : heading.toFixed(0);
  $('acc').textContent     = acc.toFixed(0);

  // Skip if a previous write batch is still in flight (avoid pile-up).
  if (writeBusy) return;
  writeBusy = true;
  try {
    // 1) stream raw GPS (existing char)
    if (gpsChar) {
      const payload = `${c.latitude.toFixed(6)},${c.longitude.toFixed(6)},${speed.toFixed(2)},${heading.toFixed(1)},${acc.toFixed(1)}`;
      try {
        await gpsChar.writeValueWithoutResponse(new TextEncoder().encode(payload));
        $('sent').textContent = ++sentCount;
      } catch (e) {
        setStatus('GPS write fail: ' + e.message);
      }
    }

    // 2) compute + stream current nav step (new char), throttled
    if (route && navChar && (Date.now() - lastNavWrite >= NAV_MIN_INTERVAL_MS)) {
      const here = { lat: c.latitude, lon: c.longitude };

      // advance past steps whose maneuver point we've passed (within 20 m)
      while (stepIdx < route.steps.length - 1) {
        const [mlon, mlat] = route.steps[stepIdx].maneuver.location;
        if (haversine(here, { lat: mlat, lon: mlon }) < 20) stepIdx++;
        else break;
      }

      const step = route.steps[stepIdx];
      const [mlon, mlat] = step.maneuver.location;
      const distToNext = haversine(here, { lat: mlat, lon: mlon });
      const { m, angle } = osrmToManeuver(step.maneuver.type, step.maneuver.modifier || '');
      const street = step.name || step.maneuver.instruction || step.maneuver.type || '';

      let remaining = distToNext;
      for (let i = stepIdx + 1; i < route.steps.length; i++) remaining += route.steps[i].distance;
      const eta_min = Math.max(1, Math.round(remaining / 4.5 / 60));   // ~16 km/h cycling

      // tiny breathing room between back-to-back writes on different characteristics
      await new Promise(r => setTimeout(r, 30));

      try {
        // Wrap as Uint8Array for maximum compatibility across Chrome versions.
        const pkt = new Uint8Array(packNav(m, angle, distToNext, eta_min, remaining, street, mlat, mlon));
        await navChar.writeValueWithoutResponse(pkt);
        lastNavWrite = Date.now();
        $('route-next').textContent = `${street} - ${Math.round(distToNext)} m`;
      } catch (e) {
        setStatus('nav write fail: ' + e.message);
      }
    }
  } finally {
    writeBusy = false;
  }

  // Refresh the LOCAL polyline slice if we've moved enough / been long enough.
  // Throttled internally; runs outside the writeBusy guard since it acquires
  // its own (sequentially after this batch).
  if (route) maybeSendLocal(c.latitude, c.longitude);
}

function onGeoError(e) { setStatus('GPS error: ' + e.message); }

// ---------- wire up ----------
$('connect').addEventListener('click', connect);
$('stop').addEventListener('click', () => { if (device?.gatt?.connected) device.gatt.disconnect(); else onDisconnected(); });
$('go').addEventListener('click', go);
$('dest').addEventListener('input', onDestInput);
$('dest').addEventListener('focus', primeLastKnownPos);
$('dest').addEventListener('keydown', e => { if (e.key === 'Enter') { renderSuggestions([]); go(); } });
$('clear-route').addEventListener('click', clearRoute);
</script>
</body>
